name: Build and deploy to Cloudflare Pages

on:
  workflow_dispatch: {}
  # auto-deploy disabled on this template repo (it is starter code, not a site)
  # client repos forked from this template re-enable push triggers via setup_client.py


jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build site
        run: python3 build.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./site --project-name=austin-area-roofers --branch=main --commit-dirty=true
